name: Release Extension Zip

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate tag and package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          echo "Tag version     : ${TAG_VERSION}"
          echo "Package version : ${PKG_VERSION}"

          if [[ "${TAG_VERSION}" != "${PKG_VERSION}" ]]; then
            echo "Error: tag (${GITHUB_REF_NAME}) and package.json version (${PKG_VERSION}) do not match."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build and package extension zip
        run: npm run package

      - name: Verify zip artifact exists
        shell: bash
        run: |
          ZIP_NAME="chrome-summarizer-ja-v${GITHUB_REF_NAME#v}.zip"
          if [[ ! -f "${ZIP_NAME}" ]]; then
            echo "Error: expected zip not found: ${ZIP_NAME}"
            ls -la
            exit 1
          fi
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Generate checksum
        shell: bash
        run: |
          sha256sum "${ZIP_NAME}" > "${ZIP_NAME}.sha256"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256
